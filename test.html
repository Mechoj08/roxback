<!-- dev-only: drives the app in an iframe and logs [TEST] results to the console -->
<!DOCTYPE html><html><head><meta charset="utf-8"></head><body>
<iframe id="f" src="index.html#tab=today" style="width:390px;height:1200px"></iframe>
<script>
const tick = (ms=120) => new Promise(r => setTimeout(r, ms));
document.getElementById("f").onload = async () => {
  const w = document.getElementById("f").contentWindow, d = w.document;
  const log = (...a) => console.log("[TEST]", ...a);
  const click = sel => { const el = d.querySelector(sel); if (!el) { log("FAIL: missing", sel); return false; } el.click(); return true; };
  const st = () => JSON.parse(w.localStorage.getItem("roxback-v1"));
  try {
    w.confirm = () => true; w.alert = m => log("alert:", m);
    await tick();
    // 1. morning check-in
    click('[data-act="pain"][data-v="2"]'); await tick();
    click('[data-act="stiff"]'); await tick();
    click('[data-act="save-checkin"]'); await tick();
    const c = Object.values(st().checkins)[0];
    log("checkin:", c ? JSON.stringify(c) : "FAIL");
    // 2. log today's planned session
    click('[data-act="log-session"]'); await tick();
    d.getElementById("f-km").value = "4"; d.getElementById("f-min").value = "28";
    d.getElementById("f-hr").value = "129"; d.getElementById("f-rpe").value = "4"; d.getElementById("f-pain").value = "1";
    click('[data-act="save-log"]'); await tick();
    const wk = st().workouts[0];
    log("workout:", wk ? `kind=${wk.kind} km=${wk.km} slot=${wk.slot} week=${wk.week}` : "FAIL");
    log("done-cells:", d.querySelectorAll(".wcell.done").length, "(expect 1)");
    // 3. delete it from history
    d.querySelector('[data-tab="log"]').click(); await tick();
    click('[data-act="del-log"]'); await tick();
    log("after-delete:", st().workouts.length, "(expect 0)");
    // 4. settings save
    d.getElementById("btn-settings").click(); await tick();
    d.getElementById("s-hr").value = "188"; d.getElementById("s-base").value = "12";
    click('[data-act="save-settings"]'); await tick();
    log("settings:", st().settings.maxHR, st().settings.baseKm, "(expect 188 12)");
    // 5. race target + date
    d.querySelector('[data-tab="race"]').click(); await tick();
    const rd = d.getElementById("f-race"); if (rd) { rd.value = "2026-11-14"; click('[data-act="set-race"]'); await tick(); }
    log("raceDate:", st().settings.raceDate, "(expect 2026-11-14)");
    d.getElementById("f-th").value = "1"; d.getElementById("f-tm").value = "40";
    click('[data-act="set-target"]'); await tick();
    log("spine-segments:", d.querySelectorAll(".seg").length, "(expect 16)");
    const cum = d.querySelectorAll(".seg .cum"); const lastCum = cum[cum.length-1]?.textContent;
    log("last-cum:", lastCum, "(expect ~@ 1:40:00 minus wall-ball end ok)");
    // 6. backfill: date change makes the "counts as" picker week-aware
    d.querySelector('[data-tab="log"]').click(); await tick();
    click('[data-act="kind"][data-v="easy"]'); await tick();
    const past = new Date(Date.now() - 7*86400000);
    const pIso = past.getFullYear()+"-"+String(past.getMonth()+1).padStart(2,"0")+"-"+String(past.getDate()).padStart(2,"0");
    d.getElementById("f-date").value = pIso;
    d.getElementById("f-date").dispatchEvent(new w.Event("change", {bubbles:true})); await tick();
    const optTxt = d.getElementById("f-slot").options[1].textContent;
    log("slot-label:", /last week/.test(optTxt) ? "week-aware ok" : "FAIL: " + optTxt);
    d.getElementById("f-km").value = "5"; d.getElementById("f-min").value = "33";
    click('[data-act="save-log"]'); await tick();
    const bw = st().workouts[0];
    log("backfill:", bw ? `week=${bw.week} slot=${bw.slot}` : "FAIL", "(expect week=-1 slot=1)");
    // 7. skip / unskip a session
    d.querySelector('[data-tab="today"]').click(); await tick();
    click('[data-act="skip-session"]'); await tick();
    log("skips:", JSON.stringify(st().skips), "(expect {\"0\":[1]})");
    log("skip-cell:", d.querySelectorAll(".wcell.skip").length, "(expect 1)");
    d.querySelector('[data-tab="plan"]').click(); await tick();
    click('[data-act="unskip-session"]'); await tick();
    log("after-unskip:", JSON.stringify(st().skips["0"] || []), "(expect [])");
    // 8. re-render sanity across tabs
    for (const t of ["today","plan","progress","log"]) { d.querySelector(`[data-tab="${t}"]`).click(); await tick(60); }
    log("tabs-ok");
    log("DONE");
  } catch (e) { log("EXCEPTION:", e.message); }
};
</script></body></html>
